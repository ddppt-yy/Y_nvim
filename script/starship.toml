# ========== 其他工具模块 ==========
[shell]
zsh_indicator  = 'z'
tcsh_indicator = 'c'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = false


[cmd_duration]
min_time = 2_000
show_milliseconds = true
style = "bold yellow"

[line_break]
disabled = false

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[✗](bold red) "

[custom.zellij_status]
command = '''bash -c 'if [ -n "$ZELLIJ" ]; then echo "   "; else echo ""; fi' '''
shell = "bash"
style = "fg:white"
format = "[$output]($style)"
# 可选：只在特定目录或总是显示
when = true
